<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kurir Optimizer - Project JTE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #routeGraph { position: relative; width: 100%; height: 500px; background: #fff; border: 1px solid #ddd; overflow: hidden; margin-top: 20px; }
        .node { position: absolute; width: 12px; height: 12px; background: red; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .line { position: absolute; background: blue; height: 2px; transform-origin: 0 50%; z-index: 5; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-primary mb-4">🚚 Kurir Route Optimizer</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-3">
                    <label for="startCity" class="form-label fw-bold">Titik Awal (Depot):</label>
                    <select id="startCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <label for="endCity" class="form-label fw-bold">Titik Akhir (Tujuan):</label>
                    <select id="endCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <button id="calculateBtn" class="btn btn-primary w-100">Cek Rute Terpendek</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h4>Hasil Optimasi:</h4>
                    <hr>
                    <p class="fs-5">Total Jarak: <strong id="distDisplay">0</strong> km</p>
                    <div id="routeDisplay" class="mt-3"></div>
                    <div id="routeGraph"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mengoper data koordinat dari Flask ke JavaScript global
        const cityCoords = {{ coords | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/plot_route.js') }}"></script>
</body>
</html>
