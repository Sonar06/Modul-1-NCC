<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kurir Optimizer - Project JTE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-primary mb-4">🚚 Kurir Route Optimizer</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-3">
                    <label class="form-label fw-bold">Titik Awal (Depot):</label>
                    <select id="startCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <label class="form-label fw-bold">Titik akhir (Tujuan):</label>
                    <select id="endCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <button onclick="calculate()" class="btn btn-primary w-100">Cek Rute Terpendek</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h4>Hasil Optimasi:</h4>
                    <hr>
                    <p class="fs-5">Total Jarak: <strong id="distDisplay">0</strong> km</p>
                    <div id="routeDisplay" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function calculate() {
            const start = document.getElementById('startCity').value;
            const end = document.getElementById('endCity').value;

            if (!start || !end) {
                alert("Pilih titik awal dan akhir!");
                return;
            }
            
            const response = await fetch('/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    start_city: start,
                    end_city: end
                })
            });
            
            const result = await response.json();
            
            if (result.error) {
                alert("Error: " + result.error);
            } else {
                document.getElementById('distDisplay').innerText = result.distance;
                document.getElementById('routeDisplay').innerHTML = 
                    result.route.map((city, i) => `<span>${i+1}. ${city}</span>`).join('<br> ➡️ ');
            }
        }
    </script>
</body>
</html>
