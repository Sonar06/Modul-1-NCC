<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kurir Optimizer - Project JTE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-primary mb-4">🚚 Kurir Route Optimizer</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-3">
                    <label class="form-label fw-bold">Titik Awal (Depot):</label>
                    <select id="startCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <label class="form-label fw-bold">Titik akhir (Tujuan):</label>
                    <select id="endCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <button onclick="calculate()" class="btn btn-primary w-100">Cek Rute Terpendek</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h4>Hasil Optimasi:</h4>
                    <hr>
                    <div id="routeDisplay" class="mt-3"></div>
                    <p class="fs-5">Total Jarak: <strong id="distDisplay">0</strong> km</p>
                    <div id="routeDisplay" class="mt-3"></div>

                    <canvas id="routeCanvas" width="900" height="400" style="border:1px solid #ccc; margin-top:20px;"></canvas>
                </div>
            </div>
        </div>
    </div>

        <script>
            const cityCoords = {{ city_coords|tojson }};

            const canvas = document.getElementById('routeCanvas');
            const ctx = canvas.getContext('2d');

            function drawRoute(route) {
                // Bersihkan canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Hitung skala agar semua kota masuk canvas
                const allX = Object.values(cityCoords).map(c => c[0]);
                const allY = Object.values(cityCoords).map(c => c[1]);
                const minX = Math.min(...allX), maxX = Math.max(...allX);
                const minY = Math.min(...allY), maxY = Math.max(...allY);

                const scaleX = canvas.width / (maxX - minX + 20);
                const scaleY = canvas.height / (maxY - minY + 20);

                // Fungsi konversi koordinat ke canvas
                const toCanvas = ([x, y]) => [
                    (x - minX) * scaleX + 10,
                    canvas.height - ((y - minY) * scaleY + 10) // invert Y
                ];

                // Gambar nodes semua kota
                for (const [city, coord] of Object.entries(cityCoords)) {
                    const [cx, cy] = toCanvas(coord);
                    ctx.fillStyle = 'blue';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 5, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.font = '12px Arial';
                    ctx.fillText(city, cx + 6, cy - 6);
                }

                // Gambar rute
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 2;
                ctx.beginPath();
                route.forEach((city, idx) => {
                    const [x, y] = toCanvas(cityCoords[city]);
                    if (idx === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                // Titik awal dan akhir beda warna
                const [startX, startY] = toCanvas(cityCoords[route[0]]);
                const [endX, endY] = toCanvas(cityCoords[route[route.length-1]]);
                ctx.fillStyle = 'green';
                ctx.beginPath(); ctx.arc(startX, startY, 6, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = 'orange';
                ctx.beginPath(); ctx.arc(endX, endY, 6, 0, 2*Math.PI); ctx.fill();
            }

            async function calculate() {
                const start = document.getElementById('startCity').value;
                const end = document.getElementById('endCity').value;

                if (!start || !end) {
                    alert("Pilih titik awal dan akhir!");
                    return;
                }

                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        start_city: start,
                        end_city: end
                    })
                });

                const result = await response.json();

                if (result.error) {
                    alert("Error: " + result.error);
                } else {
                    document.getElementById('distDisplay').innerText = result.distance;
                    document.getElementById('routeDisplay').innerHTML =
                        result.route.map((city, i) => `<span>${i+1}. ${city}</span>`).join('<br> ➡️ ');

                    drawRoute(result.route);
                }
            }
        </script>
</body>
</html>
