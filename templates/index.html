<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kurir Optimizer - Project JTE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #routeGraph { position: relative; width: 100%; height: 500px; background: #fff; border: 1px solid #ddd; overflow: hidden; margin-top: 20px; border-radius: 8px; }
        .node { position: absolute; width: 12px; height: 12px; background: #ff0000; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; border: 2px solid white; }
        .line { position: absolute; background: #004a99; height: 2px; transform-origin: 0 50%; z-index: 5; opacity: 0.6; }
        .form-select[multiple] { height: 150px; }
    </style>
</head>     
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-primary mb-4">🚚 Kurir Route Optimizer</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-3">
                    <label for="startCity" class="form-label fw-bold">Titik Awal (Depot):</label>
                    <select id="startCity" class="form-select mb-3">
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                    
                    <label class="form-label fw-bold">Pilih Kota Tujuan:</label>
                    <div class="input-group mb-3">
                        <select id="cityPicker" class="form-select">
                            <option value="" disabled selected>Pilih kota...</option>
                            {% for city in cities %}
                            <option value="{{ city }}">{{ city }}</option>
                            {% endfor %}
                        </select>
                        <button class="btn btn-outline-secondary" type="button" id="addCityBtn">➕ Tambah</button>
                    </div>

                    <div id="selectedCitiesList" class="mb-3 border p-2 rounded bg-white" style="min-height: 50px;">
                        <p class="text-muted small mb-0">Belum ada kota dipilih...</p>
                    </div>
                    
                    <button id="calculateBtn" class="btn btn-primary w-100">🚀 Cek Rute Terpendek</button>
                    <button id="clearBtn" class="btn btn-sm btn-link text-danger w-100 mt-2">Hapus Semua</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h4>Hasil Optimasi:</h4>
                    <hr>
                    <p class="fs-5">Total Jarak: <strong id="distDisplay">0</strong> km</p>
                    <div id="routeDisplay" class="mb-3"></div>
                    <div id="routeGraph"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cityCoords = {{ coords | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/plot_route.js') }}"></script>
</body>
</html>
