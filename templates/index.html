<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <h3 class="text-center mb-4">Optimasi Rute</h3>
                
                <form action="/optimize" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold" for="startCity">Titik Awal (Depot):</label>
                        <select id="startCity" name="start_city" class="form-select mb-3">
                            <option value="" disabled selected>Pilih kota asal</option>
                            {% for city in cities %}
                                <option value="{{ city }}">{{ city }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold" for="endCity">Titik Akhir (Tujuan):</label>
                        <select id="endCity" name="end_city" class="form-select mb-3">
                            <option value="" disabled selected>Pilih kota tujuan</option>
                            {% for city in cities %}
                                <option value="{{ city }}">{{ city }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Optimalkan Rute</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/plot_route.js') }}"></script>
</body>
</html>
