<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kurir Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="text-primary mb-4">🚚 Kurir Route Optimizer</h2>
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <label class="form-label fw-bold">Titik Awal (Depot):</label>
                <select id="startCity" class="form-select mb-3">
                    {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>

                <label class="form-label fw-bold">Titik Akhir (Tujuan):</label>
                <select id="endCity" class="form-select mb-3">
                    {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>

                <button onclick="calculate()" class="btn btn-primary w-100">Cek Rute Terpendek</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm p-4">
                <h4>Hasil Optimasi:</h4>
                <hr>
                <p class="fs-5">Total Jarak: <strong id="distDisplay">0</strong> km</p>
                <canvas id="routeCanvas" width="700" height="500" class="border"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/plot_route.js') }}"></script>
</body>
</html>
