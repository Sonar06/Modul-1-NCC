services:
  route-app:
    build: .
    container_name: route-app
    ports:
      - "80:5000"    # Akses Publik Utama
      - "3000:5000"  # Akses Khusus Health Check
    environment:
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5000
    restart: always
    healthcheck:
      # Cek kesehatan tetap ke localhost karena ini dijalankan DARI DALAM kontainer ke dirinya sendiri
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').getcode()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s