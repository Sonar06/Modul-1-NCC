services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: berita-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - mysql
    networks:
      - ci-network

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: iniberita
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ci-network

  health-app:
    build: 
      context: ./healthcheck
    container_name: service-vps-modul-ncc
    restart: always
    environment:
      - PORT=5000
    # Port Configuration: Akses dari luar via 3000
    ports:
      - "3000:5000"
    networks:
      - ci-network

volumes:
  mysql-data:

networks:
  ci-network: